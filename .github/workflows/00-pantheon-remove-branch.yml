# Name: Remove a Pantheon multidev environment/branch.
# Type: Helper.
# Use: Remove a Pantheon multidev environment that matches the current branch
#      name, and then remove the associated branch.

name: Remove Pantheon multidev environment/branch.

on:
  workflow_call:
    inputs:
      pantheon_machine_name:
        description: 'Pantheon site name.'
        type: string
        required: true
      strip_prefix:
        description: 'Optionally, a prefix to strip.'
        type: string
        required: false
      safe_prefix:
        description: 'Optional single letter safe prefix.'
        type: string
        required: false
        default: 't'
      php_version:
        description: 'Optionally, specify a PHP version to install. Default: 8.3.'
        type: string
        required: false
        default: '8.3'
    secrets:
      PANTHEON_MACHINE_TOKEN:
        description: 'Machine token authorised to the Pantheon site.'
        required: true
      REMOTE_REPO:
        description: 'The remote repository URL.'
        required: true

defaults:
  run:
    shell: bash

jobs:
  destroy-multidev:
    name: 'Remove Pantheon multi-dev environment'
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.head_ref }}
      PANTHEON_MACHINE_NAME: ${{ inputs.pantheon_machine_name }}
    steps:
      # It's safe to use a checkout here, instead of the cached build, just to
      # get access to the script.
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Create multi-dev-safe branch name.
        id: safe_branch
        uses: thisisgain/.github/.github/actions/pantheon-safe-branch@main
        with:
          branch_name: ${{ github.head_ref }}
          strip_prefix: ${{ inputs.strip_prefix }}
          safe_prefix: ${{ inputs.safe_prefix }}

      - name: Install PHP.
        uses: shivammathur/setup-php@master
        with:
          php-version: ${{ inputs.php_version }}

      - name: Install Terminus.
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Check whether multidev exists.
        id: check_existing
        # Terminus returns an error/warning if there are no multidevs at all;
        # this shouldn't stop the build from continuing.
        continue-on-error: true
        run: |
          # Get the multidev list and grep for the branch name passed in.
          multidev_list=$(terminus multidev:list \
            --no-interaction \
            --format=list \
            -- $PANTHEON_MACHINE_NAME \
            | grep ${{ steps.safe_branch.outputs.branch_name }})

          # Provide the list to the Github output.
          delimiter="$(openssl rand -hex 8)"
          echo "multidev_list<<${delimiter}" >> "${GITHUB_OUTPUT}"
          echo ${multidev_list} >> ${GITHUB_OUTPUT}
          echo "${delimiter}" >> "${GITHUB_OUTPUT}"

      - name: Delete the multidev environment.
        # If there was a multidev environment, delete it, and the branch.
        if: steps.check_existing.outputs.multidev_list != ''
        continue-on-error: true
        run: |
          terminus multidev:delete \
            $PANTHEON_MACHINE_NAME.${{ steps.safe_branch.outputs.branch_name }} \
            --yes \
            --no-interaction \
            --delete-branch
          echo "🌩️ ${{ steps.safe_branch.outputs.branch_name }} multi-dev site, and associated branch, deleted!" >> $GITHUB_STEP_SUMMARY

      - name: Add Pantheon as a remote.
        # If there was no multidev, delete the remote branch only.
        if: steps.check_existing.outputs.multidev_list == ''
        run: |
          git config --global --add safe.directory $(realpath .)
          git remote add pantheon ${{ secrets.REMOTE_REPO }}

      - name: Delete the branch from Pantheon.
        # If there was no multidev, delete the remote branch only.
        if: steps.check_existing.outputs.multidev_list != ''
        # Don't mark this as a build fail if the branch doesn't delete.
        continue-on-error: true
        run: |
          git push pantheon --delete ${BRANCH_NAME}
          echo "🌩️ ${BRANCH_NAME} deleted!" >> $GITHUB_STEP_SUMMARY
