# Name: Run PHPUnit tests.
# Type: Test.
# Use: Run automated tests during builds using PHPUnit.

name: Run automated PHPUnit tests.

on:
  workflow_call:
    inputs:
      container:
        description: 'The Docker image to use.'
        type: string
        required: true
      db_image:
        description: 'A Docker database image, eg mysql:5.7 or mariadb:10.3. Default: mysql:5.7.'
        type: string
        default: 'mysql:5.7'
      db_user:
        description: 'The database username. Default: db.'
        type: string
        default: 'db'
      db_pass:
        description: 'The database password. Default: db.'
        type: string
        default: 'db'
      db_name:
        description: 'The database name. Default: db.'
        type: string
        default: 'db'
      db_root_pass:
        description: 'The database root password. Default: root.'
        type: string
        default: 'root'
      source_key:
        description: 'The source cache key suffix, or empty to perform a clean checkout.'
        type: string
        default: 'composer'
      directory:
        description: 'The directory in which to run commands.'
        type: string
        default: './'

defaults:
  run:
    shell: bash

jobs:
  phpcs:
    name: 'PHPUnit'
    runs-on: ubuntu-latest
    container: ${{ inputs.container }}
    services:
      db:
        image: ${{ inputs.db_image }}
        ports: [ 3306 ]
        env:
          MYSQL_USER: ${{ inputs.db_user }}
          MYSQL_PASSWORD: ${{ inputs.db_pass }}
          MYSQL_DATABASE: ${{ inputs.db_name }}
          MYSQL_ROOT_PASSWORD: ${{ inputs.db_root_pass }}
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3
    steps:
      - name: Restore build from a previous step.
        uses: actions/cache/restore@v5
        id: restore-build
        with:
          path: ./*
          # We are only interested in a direct hit.
          key: build-${{ github.sha }}-${{ inputs.source_key }}

      - name: Abort if we have a source build cache miss.
        run: exit 1
        if: steps.restore-build.outputs.cache-hit != 'true'

      - name: Abort if PHPUnit isn't installed.
        run: test -f ./vendor/bin/phpunit || exit 1

      - name: Start the PHP server.
        run: |
          cd ${{ inputs.directory }}
          php -S 127.0.0.1:8888 .ht.router.php > /tmp/php-log.txt 2>&1 &

      - name: Run PHPUnit.
        env:
          SIMPLETEST_DB: 'mysql://db:db@db:3306/db'
          SIMPLETEST_BASE_URL: 'http://127.0.0.1:8888'
        run: |
          cd ${{ inputs.directory }}
          ./vendor/bin/phpunit

      - name: Output PHP logs on error.
        if: failure()
        run: cat /tmp/php-log.txt
